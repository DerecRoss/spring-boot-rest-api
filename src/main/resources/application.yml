cors:
  originPatterns: http://localhost:8080,http://localhost:3000,http://github.com/DerecRoss
file:
  upload-dir: /Documentos/code/uploadDir/
spring:
  application:
    name: spring-boot-rest-api

  datasource:
    url: jdbc:mysql://localhost:3306/springdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: spring
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      format_sql: true
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  servlet:
    multipart:
      enable: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB
logging:
  level:
    #    root: WARN
    org.flywaydb: DEBUG
    com.rest_api: DEBUG

springdoc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    user-root-path: true

server:
  port: 8080
