server:
  port: 8080
cors:
  originPatterns: http://localhost:8080,http://localhost:3000,http://github.com/DerecRoss
spring:
  application:
    name: spring-boot-rest-api

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

logging:
  level:
    #    root: WARN
    org.flywaydb: DEBUG
    com.rest_api: DEBUG

springdoc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    user-root-path: true
